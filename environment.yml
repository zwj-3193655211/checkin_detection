# 晨读晨练签到检测系统 - Conda环境配置
# 创建方式: conda env create -f environment.yml
# 激活方式: conda activate checkin_detection

name: checkin_detection
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pip:
    # 核心依赖
    - pillow>=10.0.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - scikit-learn>=1.3.0
    # CLIP视觉模型
    - git+https://github.com/openai/CLIP.git
